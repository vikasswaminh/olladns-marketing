name: Deploy marketing site to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy olladns-marketing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Cache wrangler global install between runs
      - name: Cache npm global
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/wrangler
          key: wrangler-${{ runner.os }}-v1

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=olladns-marketing --branch=main --commit-dirty=true
